  before_script:
    - until docker info; do sleep 1; done
    - echo $HARBOR_PASSWORD | docker login $HARBOR_HOST --username $HARBOR_USERNAME --password-stdin
  script:
    - echo "//IMAGE Building//"

    - docker build --build-arg BRANCH_NAME=uat -t $HARBOR_HOST/$HARBOR_PROJECT:uat .
