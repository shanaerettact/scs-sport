  extends: .shared_runner_job
  rules:
    # 如果是在 develop 分支且有其他檔案變動，則執行 pipeline
    - if: '$CI_COMMIT_REF_NAME == "prod"'
      changes:
        - "*"
        - "**/*"
        
    # 如果是在 develop 分支且變動只發生在 kubernetes-manifests/* 目錄下，不執行 pipeline
    - if: '$CI_COMMIT_REF_NAME == "prod"'
      changes:
        - "kubernetes-manifests/*"
        - "kubernetes-manifests/**/*"
      when: never

    # 如果是在 develop 分支且有其他檔案變動，則執行 pipeline
    - if: '$CI_COMMIT_REF_NAME == "prod"'
      changes:
        - "*"
        - "**/*"
      when: always
  before_script:
    - until docker info; do sleep 1; done
    - echo $HARBOR_PASSWORD | docker login $HARBOR_HOST --username $HARBOR_USERNAME --password-stdin
  script:
    - echo "//IMAGE Building//"

    - docker build --build-arg BRANCH_NAME=prod -t $HARBOR_HOST/$HARBOR_PROJECT:prod .
    - docker push $HARBOR_HOST/$HARBOR_PROJECT:prod
